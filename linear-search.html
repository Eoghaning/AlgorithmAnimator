<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Search - Algorithm Animator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Algorithm<span>Animator</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="sorting.html">Sorting</a></li>
                <li><a href="searching.html" class="active"> Searching</a></li>
            </ul>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>Linear Search</h1>
            <p>Checks each item one by one.</p>
        </div>
    </header>

    <section class="visualization-container">
        <div class="container">
            <div class="viz-area">
                <div class="complexity-info" style="margin-bottom: 1rem;">
                    <span class="complexity-label">Best:</span> O(1) | 
                    <span class="complexity-label">Average:</span> O(n) | 
                    <span class="complexity-label">Worst:</span> O(n)
                </div>
                
                <div class="controls" style="margin-bottom: 1rem;">
                    <div class="control-group">
                        <label for="searchTarget" style="color: var(--text-secondary); font-size: 0.875rem;">Find:</label>
                        <input type="number" id="searchTarget" placeholder="Number" min="1" max="100">
                    </div>
                </div>
                
                <div class="array-container" id="arrayContainer"></div>

                <div class="controls">
                    <button class="btn btn-secondary" id="startBtn" onclick="startSearch()">Find</button>
                    <button class="btn btn-small" id="pauseBtn" onclick="pauseSearch()">Pause</button>
                    <button class="btn btn-small" onclick="resetSearch()">Reset</button>
                    <button class="btn btn-small" onclick="generateRandomArray()">New</button>
                    
                    <div class="control-group">
                        <label style="color: var(--text-secondary); font-size: 0.875rem;">Speed:</label>
                        <div class="speed-buttons">
                            <button class="speed-btn" onclick="setSpeed(1)">1</button>
                            <button class="speed-btn" onclick="setSpeed(2)">2</button>
                            <button class="speed-btn selected" onclick="setSpeed(3)">3</button>
                            <button class="speed-btn" onclick="setSpeed(4)">4</button>
                            <button class="speed-btn" onclick="setSpeed(5)">5</button>
                        </div>
                    </div>
                    
                    <div class="control-group">
                        <label for="arraySize" style="color: var(--text-secondary); font-size: 0.875rem;">Size:</label>
                        <input type="number" id="arraySize" min="5" max="30" value="15" onchange="resizeArray()">
                    </div>
                </div>

                <div class="stats-container">
                    <div class="stat-card">
                        <div class="stat-value" id="comparisons">0</div>
                        <div class="stat-label">Checks</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="currentStep">0</div>
                        <div class="stat-label">Step</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="status">Ready</div>
                        <div class="stat-label">Status</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="description-section">
        <div class="container">
            <div class="description-content">
                <h2>How It Works</h2>
                <p>Linear Search checks each element one by one until it finds the target.</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>Algorithm Animator</p>
    </footer>

    <script src="script.js"></script>
    <script>
        function setSpeed(level) {
            const buttons = document.querySelectorAll('.speed-btn');
            buttons.forEach(btn => btn.classList.remove('selected'));
            buttons[level - 1].classList.add('selected');
            const speeds = [2240, 1120, 560, 373, 280];
            animationSpeed = speeds[level - 1];
        }
    </script>
</body>
</html>
