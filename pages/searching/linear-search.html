<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Search - Algorithm Animator</title>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../../index.html" class="logo">Algorithm<span>Animator</span></a>
            <ul class="nav-links">
                <li><a href="../../index.html">Home</a></li>
                <li><a href="../../sorting.html">Sorting</a></li>
                <li><a href="../../searching.html" class="active">Searching</a></li>
            </ul>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>Linear Search</h1>
            <p>Checks each item one by one until the target is found.</p>
        </div>
    </header>

    <section class="visualization-container">
        <div class="container">
            <div class="viz-area">
                <div class="complexity-info" style="margin-bottom: 1rem;">
                    <span class="complexity-label">Best:</span> O(1) | 
                    <span class="complexity-label">Average:</span> O(n) | 
                    <span class="complexity-label">Worst:</span> O(n)
                </div>
                
                <div class="array-container" id="arrayContainer"></div>

                <div class="controls">
                    <div class="control-group">
                        <label for="searchTarget" style="color: var(--text-secondary); font-size: 0.875rem;">Target:</label>
                        <input type="number" id="searchTarget" placeholder="Value..." style="width: 80px;">
                    </div>
                    <button class="btn btn-secondary" id="startBtn" onclick="startSearch()">Search</button>
                    <button class="btn btn-small" onclick="resetSearch()">Reset</button>
                    <button class="btn btn-small" onclick="generateSortedArray()">New</button>
                    
                    <div class="control-group">
                        <label style="color: var(--text-secondary); font-size: 0.875rem;">Speed:</label>
                        <div class="speed-buttons">
                            <button class="speed-btn" onclick="setSpeed(1)">1</button>
                            <button class="speed-btn" onclick="setSpeed(2)">2</button>
                            <button class="speed-btn selected" onclick="setSpeed(3)">3</button>
                            <button class="speed-btn" onclick="setSpeed(4)">4</button>
                            <button class="speed-btn" onclick="setSpeed(5)">5</button>
                        </div>
                    </div>
                </div>

                <div class="stats-container">
                    <div class="stat-card">
                        <div class="stat-value" id="comparisons">0</div>
                        <div class="stat-label">Comparisons</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="currentStep">0</div>
                        <div class="stat-label">Step</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="status">Ready</div>
                        <div class="stat-label">Status</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>Algorithm Animator</p>
    </footer>

    <script src="../../js/core.js"></script>
    <script src="../../js/searching.js"></script>
</body>
</html>
